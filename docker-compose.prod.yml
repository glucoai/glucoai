services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_backup:
    image: prodrigestivill/postgres-backup-local:16
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: ${POSTGRES_BACKUP_CRON}
      BACKUP_DIR: /backups
    volumes:
      - backups_postgres:/backups
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_SENHA}", "--appendonly", "yes"]
    volumes:
      - dados_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_SENHA}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      URL_BANCO: ${URL_BANCO}
      URL_REDIS: ${URL_REDIS}
      JWT_SEGREDO: ${JWT_SEGREDO}
      OPENAI_CHAVE: ${OPENAI_CHAVE}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ALERTA_NUMERO: ${WHATSAPP_ALERTA_NUMERO}
      STRIPE_CHAVE: ${STRIPE_CHAVE}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/saude || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ia_worker:
    build:
      context: .
      dockerfile: workers/ia-worker/Dockerfile
    environment:
      URL_BANCO: ${URL_BANCO}
      URL_REDIS: ${URL_REDIS}
      OPENAI_CHAVE: ${OPENAI_CHAVE}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ALERTA_NUMERO: ${WHATSAPP_ALERTA_NUMERO}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    environment:
      DOMINIO: ${DOMINIO}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    command: /bin/sh -c "envsubst '$$DOMINIO' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - nginx
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  dados_postgres:
  backups_postgres:
  dados_redis:
  certbot_www:
  letsencrypt:
