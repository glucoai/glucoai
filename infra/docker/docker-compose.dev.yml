services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: glucoai
      POSTGRES_USER: glucoai
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glucoai -d glucoai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "dev123"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dados_postgres:
